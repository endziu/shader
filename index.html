<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal Shader</title>
</head>
<body>
<canvas id="c"></canvas>

<h1 id="title"><a href="https://endziu.xyz/projects.html">endziu.xyz</a></h1>

<button id="panel-toggle" title="toggle controls [h]">ctrl</button>

<div class="controls" id="controls-panel">
  <div class="group">
    <div class="group-label">motion</div>
    <div class="slider-row">
      <label for="speed-slider">speed <span id="speed-val">0.30</span></label>
      <input type="range" id="speed-slider" min="0" max="2" step="0.01" value="0.3">
    </div>
  </div>

  <div class="group">
    <div class="group-label">color</div>
    <div class="slider-row">
      <label for="hue-slider">hue shift <span id="hue-val">0.00</span></label>
      <input type="range" id="hue-slider" min="0" max="1" step="0.01" value="0">
    </div>
    <button id="cycle-btn" data-active="false">cycle off</button>
  </div>

  <div class="group">
    <div class="group-label">detail</div>
    <div class="slider-row">
      <label for="density-slider">iterations <span id="density-val">65</span></label>
      <input type="range" id="density-slider" min="20" max="120" step="5" value="65">
    </div>
    <button id="quality-btn" data-active="true">quality hi</button>
  </div>
</div>

<script type="module" src="/main.js"></script>
</body>
</html>
