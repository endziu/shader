<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractal Shader</title>
<style>
  * { margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; width: 100%; height: 100%; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById("c");
const gl = canvas.getContext("webgl2");

const vs = `#version 300 es
in vec2 a;
void main(){ gl_Position = vec4(a, 0, 1); }`;

const fs = `#version 300 es
precision highp float;
uniform vec2 r;
uniform float t;
uniform vec2 m;
uniform float zoom;
uniform float click;
uniform float rclick;
uniform vec2 clickPos;
uniform float quality;
out vec4 o;

vec3 palette(float t, float shift) {
  vec3 a = vec3(0.5, 0.5, 0.5);
  vec3 b = vec3(0.5, 0.5, 0.5);
  vec3 c = vec3(1.0, 0.7, 0.4);
  vec3 d = vec3(0.0, 0.15, 0.20) + shift;
  return a + b * cos(6.28318 * (c * t + d));
}

float hash(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * 0.1031);
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}

float noise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash(i), hash(i + vec2(1, 0)), f.x),
    mix(hash(i + vec2(0, 1)), hash(i + vec2(1, 1)), f.x),
    f.y
  );
}

float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  int oct = quality > 0.5 ? 5 : 3;
  mat2 rot = mat2(0.8, 0.6, -0.6, 0.8);
  for (int i = 0; i < 5; i++) {
    if (i >= oct) break;
    v += a * noise(p);
    p = rot * p * 2.0;
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = (gl_FragCoord.xy - r * 0.5) / min(r.x, r.y);

  float spd = 0.3;
  float sc = 2.5 * zoom;

  vec2 mUV = (m - 0.5) * vec2(r.x / r.y, 1.0);
  vec2 mOff = (m - 0.5) * 0.4;
  vec2 cUV = (clickPos - 0.5) * vec2(r.x / r.y, 1.0);

  float dist = length(uv - mUV);
  float influence = smoothstep(0.45, 0.0, dist);

  float cDist = length(uv - cUV);

  // === LEFT CLICK: chaos explosion ===
  float wave = click * sin(dist * 40.0 - t * 12.0) *
               exp(-dist * 3.0) * smoothstep(0.0, 0.3, click);
  float shatter = click * fbm(uv * 12.0 + t * 2.0) *
               exp(-dist * 2.0);

  float vortex = click * 0.6 * exp(-dist * 4.0);
  float ca = cos(vortex), sa = sin(vortex);
  vec2 rel = uv - mUV;
  uv = mUV + vec2(rel.x * ca - rel.y * sa, rel.x * sa + rel.y * ca);

  vec2 radial = normalize(uv - mUV + 0.001) * wave * 0.08;
  uv += radial + vec2(shatter, -shatter) * 0.1;

  // === RIGHT CLICK: black hole singularity ===
  vec2 rUV = mUV;
  float rDist = dist;
  // Massive gravitational pull — everything collapses inward
  float pull = rclick * 0.85 * exp(-rDist * 1.2);
  uv = mix(uv, rUV, pull);

  // Violent counter-vortex — reverse spin, much harder
  float rVortex = -rclick * 2.5 * exp(-rDist * 2.0);
  float rca = cos(rVortex), rsa = sin(rVortex);
  vec2 rrel = uv - rUV;
  uv = rUV + vec2(rrel.x * rca - rrel.y * rsa, rrel.x * rsa + rrel.y * rca);

  // Spacetime tearing — jagged noise displacement
  float tear = rclick * fbm(uv * 20.0 + t * 3.0) * exp(-rDist * 1.5) * 0.2;
  float tear2 = rclick * fbm(uv * 35.0 - t * 5.0) * exp(-rDist * 2.0) * 0.12;
  uv += vec2(tear, -tear) + vec2(-tear2, tear2);

  // Concentric gravity waves — dense interference pattern
  float gWave = rclick * sin(rDist * 60.0 - t * 18.0) *
                exp(-rDist * 2.0) * 0.06;
  uv += normalize(uv - rUV + 0.001) * gWave;

  vec2 warp = vec2(
    fbm(uv * 6.0 + t * 0.3),
    fbm(uv * 6.0 + vec2(5.2, 1.3) + t * 0.3)
  ) - 0.5;
  uv += warp * influence * 0.15;

  float i, e, R, s;
  vec3 q, p, d = vec3(uv * sc + mOff, 0.6);

  // Left click: twist ray
  float twist = click * sin(t * 8.0) * 0.3 * exp(-cDist * 3.0);
  float tc = cos(twist), ts = sin(twist);
  d.xy = vec2(d.x * tc - d.y * ts, d.x * ts + d.y * tc);

  vec3 col = vec3(0.0);

  // Right click: warp the ray itself — bend toward singularity
  float rBend = rclick * 0.8 * exp(-rDist * 2.5);
  d.z += rBend * 0.5;
  d.xy = mix(d.xy, normalize(rUV - uv + 0.001) * 0.3, rBend * 0.4);

  float baseIter = mix(50.0, 80.0, quality);
  float maxIter = baseIter + click * 40.0;
  float spdMod = spd + click * 1.5 + rclick * 0.8;

  for (q.zy--; i++ < maxIter; ) {
    s = 4.0;
    p = q += d * e * R * (0.35 - click * 0.12);
    R = length(p);

    float nz = influence * fbm(p.xy * 3.0 + t * 0.5) * 0.4;
    float clickNz = click * sin(R * 10.0 - t * 6.0) * 0.3 *
                    exp(-abs(length(p.xy) - cDist * 2.0));

    p = vec3(
      log(R) - t * spdMod + nz + clickNz,
      exp(-p.z / R) + sin(t * (0.4 + click * 2.0)) * (0.12 + click * 0.2)
        + 0.25 + nz * 0.5,
      atan(p.y, p.x) + t * 0.08 + click * sin(t * 3.0) * 0.5
    );
    for (e = --p.y; s < 1e3; s += s)
      e += dot(sin(p.zxx * s), 0.35 - cos(p.yyz * s)) / s * 0.25;

    float brightness = min(e * s, 1.0) / maxIter;
    float hue = 0.12 + i * 0.008 + t * 0.02 + influence * 0.15
              + click * (sin(t * 4.0) * 0.3 + i * 0.02);
    col += palette(hue, m.x * 0.3 + click * 0.5) * brightness;
  }

  // Left click: color explosion
  vec3 bloom = click * vec3(
    fbm(uv * 8.0 + t * 1.5),
    fbm(uv * 8.0 + vec2(3.7, 1.2) + t * 1.5),
    fbm(uv * 8.0 + vec2(1.2, 5.8) + t * 1.5)
  ) * exp(-cDist * 2.5) * 0.6;
  col += bloom;

  // Left click: flash pulse
  col += click * 0.15 * exp(-cDist * 5.0) *
         (0.5 + 0.5 * sin(t * 20.0)) * vec3(1.0, 0.7, 0.3);

  // === RIGHT CLICK: ANNIHILATION ===

  // Total color death — strip everything to red channel only
  float rc = rclick * smoothstep(0.0, 0.2, rclick);
  vec3 bloodCol = vec3(col.r * 0.5, col.r * 0.02, col.r * 0.0);
  col = mix(col, bloodCol, rc);

  // Black hole center — absolute void, hard edge
  float eventHorizon = smoothstep(0.0, 0.06 + rc * 0.08, rDist);
  col *= mix(1.0, eventHorizon, rc);

  // Accretion disk — screaming hot ring of dark red
  float disk1 = exp(-pow((rDist - 0.1 - rc * 0.06) * 12.0, 2.0));
  float disk2 = exp(-pow((rDist - 0.18 - rc * 0.1) * 8.0, 2.0));
  float diskPulse = 0.5 + 0.5 * sin(t * 10.0 + rDist * 30.0);
  col += rc * disk1 * vec3(0.8, 0.05, 0.0) * diskPulse;
  col += rc * disk2 * vec3(0.35, 0.0, 0.0) * (1.0 - diskPulse);

  // Lightning cracks — sharp fractal veins tearing outward
  if (quality > 0.5) {
    float crack1 = pow(fbm(uv * 25.0 + t * 4.0), 3.0);
    float crack2 = pow(fbm(uv * 40.0 - t * 6.0 + vec2(7.1, 3.3)), 3.0);
    float crackMask = rc * exp(-rDist * 1.5);
    col += crack1 * crackMask * vec3(1.0, 0.1, 0.0) * 3.0;
    col += crack2 * crackMask * vec3(0.5, 0.0, 0.0) * 2.0;
  }

  // Pulsing darkness — entire screen breathes black
  float darkPulse = 0.5 + 0.5 * sin(t * 3.0);
  col *= 1.0 - rc * 0.7 * darkPulse * exp(-rDist * 0.8);

  // Global desaturation + red push on everything
  float luma = dot(col, vec3(0.299, 0.587, 0.114));
  col = mix(col, vec3(luma * 0.6, luma * 0.03, 0.0), rc * 0.6);

  // Crush gamma hard — deep, heavy, suffocating
  col = pow(col, vec3(0.85 - click * 0.15 + rc * 0.8));

  // Vignette intensifies massively during right click
  col *= 1.0 - (0.3 - click * 0.15 + rc * 0.5) * length(uv);

  o = vec4(col, 1.0);
}`;

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
  }
  return s;
}

const pg = gl.createProgram();
gl.attachShader(pg, compile(gl.VERTEX_SHADER, vs));
gl.attachShader(pg, compile(gl.FRAGMENT_SHADER, fs));
gl.linkProgram(pg);
gl.useProgram(pg);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(
  gl.ARRAY_BUFFER,
  new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),
  gl.STATIC_DRAW
);

const aLoc = gl.getAttribLocation(pg, "a");
gl.enableVertexAttribArray(aLoc);
gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);

const uR = gl.getUniformLocation(pg, "r");
const uT = gl.getUniformLocation(pg, "t");
const uM = gl.getUniformLocation(pg, "m");
const uZoom = gl.getUniformLocation(pg, "zoom");
const uClick = gl.getUniformLocation(pg, "click");
const uRClick = gl.getUniformLocation(pg, "rclick");
const uClickPos = gl.getUniformLocation(pg, "clickPos");
const uQuality = gl.getUniformLocation(pg, "quality");

const isMobile = 'ontouchstart' in window;

let mouse = { x: 0.5, y: 0.5 };
let smoothMouse = { x: 0.5, y: 0.5 };
let zoomTarget = 0.15;
let smoothZoom = 0.15;
let leftDown = false;
let rightDown = false;
let clickIntensity = 0.0;
let rclickIntensity = 0.0;
let clickPos = { x: 0.5, y: 0.5 };

canvas.addEventListener("contextmenu", (e) => e.preventDefault());

canvas.addEventListener("mousemove", (e) => {
  mouse.x = e.clientX / canvas.clientWidth;
  mouse.y = 1.0 - e.clientY / canvas.clientHeight;
});

canvas.addEventListener("mousedown", (e) => {
  const px = e.clientX / canvas.clientWidth;
  const py = 1.0 - e.clientY / canvas.clientHeight;
  clickPos.x = px;
  clickPos.y = py;
  if (e.button === 0) leftDown = true;
  if (e.button === 2) rightDown = true;
});

canvas.addEventListener("mouseup", (e) => {
  if (e.button === 0) leftDown = false;
  if (e.button === 2) rightDown = false;
});
canvas.addEventListener("mouseleave", () => {
  leftDown = false;
  rightDown = false;
});

canvas.addEventListener("wheel", (e) => {
  e.preventDefault();
  zoomTarget *= e.deltaY > 0 ? 1.08 : 0.92;
  zoomTarget = Math.max(0.2, Math.min(zoomTarget, 5.0));
}, { passive: false });

// === Touch input ===
let touchStartTime = 0;
let touchStartPos = { x: 0, y: 0 };
let longPressTimer = null;
let pinchStartDist = 0;
let tapTimeout = null;

function touchXY(touch) {
  return {
    x: touch.clientX / canvas.clientWidth,
    y: 1.0 - touch.clientY / canvas.clientHeight
  };
}

function pinchDist(touches) {
  const dx = touches[1].clientX - touches[0].clientX;
  const dy = touches[1].clientY - touches[0].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const pos = touchXY(e.touches[0]);
    mouse.x = pos.x;
    mouse.y = pos.y;
    touchStartTime = performance.now();
    touchStartPos = pos;
    longPressTimer = setTimeout(() => {
      rightDown = true;
    }, 400);
  }
  if (e.touches.length === 2) {
    clearTimeout(longPressTimer);
    pinchStartDist = pinchDist(e.touches);
  }
}, { passive: false });

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  if (e.touches.length === 1) {
    const pos = touchXY(e.touches[0]);
    const dx = pos.x - touchStartPos.x;
    const dy = pos.y - touchStartPos.y;
    if (Math.sqrt(dx * dx + dy * dy) > 0.02) {
      clearTimeout(longPressTimer);
    }
    mouse.x = pos.x;
    mouse.y = pos.y;
  }
  if (e.touches.length === 2) {
    const dist = pinchDist(e.touches);
    if (pinchStartDist > 0) {
      const ratio = dist / pinchStartDist;
      zoomTarget *= ratio > 1 ? 0.97 : 1.03;
      zoomTarget = Math.max(0.2, Math.min(zoomTarget, 5.0));
    }
    pinchStartDist = dist;
  }
}, { passive: false });

canvas.addEventListener("touchend", (e) => {
  e.preventDefault();
  clearTimeout(longPressTimer);
  if (rightDown) {
    rightDown = false;
    return;
  }
  const elapsed = performance.now() - touchStartTime;
  if (elapsed < 300) {
    clickPos.x = touchStartPos.x;
    clickPos.y = touchStartPos.y;
    leftDown = true;
    clearTimeout(tapTimeout);
    tapTimeout = setTimeout(() => { leftDown = false; }, 500);
  }
}, { passive: false });

canvas.addEventListener("touchcancel", () => {
  clearTimeout(longPressTimer);
  clearTimeout(tapTimeout);
  leftDown = false;
  rightDown = false;
});

function resize() {
  const dpr = isMobile ? Math.min(devicePixelRatio, 1.0) : devicePixelRatio;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}

addEventListener("resize", resize);
resize();

function frame(ms) {
  smoothMouse.x += (mouse.x - smoothMouse.x) * 0.06;
  smoothMouse.y += (mouse.y - smoothMouse.y) * 0.06;
  smoothZoom += (zoomTarget - smoothZoom) * 0.04;

  clickIntensity += ((leftDown ? 1.0 : 0.0) - clickIntensity) * (leftDown ? 0.08 : 0.03);
  rclickIntensity += ((rightDown ? 1.0 : 0.0) - rclickIntensity) * (rightDown ? 0.12 : 0.025);

  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.uniform1f(uT, ms / 1000);
  gl.uniform2f(uM, smoothMouse.x, smoothMouse.y);
  gl.uniform1f(uZoom, smoothZoom);
  gl.uniform1f(uClick, clickIntensity);
  gl.uniform1f(uRClick, rclickIntensity);
  gl.uniform2f(uClickPos, clickPos.x, clickPos.y);
  gl.uniform1f(uQuality, isMobile ? 0.0 : 1.0);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
